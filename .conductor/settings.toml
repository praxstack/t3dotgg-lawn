"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Install JS deps with bun (repo pins bun@1.3.6 and commits bun.lock), then
# provision THIS worktree's own anonymous local Convex deployment: configure it,
# seed its env vars from .env.local (+ derive CLERK_JWT_ISSUER_DOMAIN), and push.
# Data lives in ./.convex (git-ignored) so every workspace is isolated.
# convex/_generated is committed, so no codegen step is needed for typecheck.
# (First-ever run downloads the ~150MB local backend binary; it is then cached
# globally and shared across worktrees.)
setup = "bun install && bash scripts/convex-local-setup.sh"

# Run the full dev stack in one process group: the local Convex backend +
# the Vite dev server. Vite serves on $CONDUCTOR_PORT; the local backend uses
# $CONDUCTOR_PORT+1 / +2. `convex dev` writes the local URL into VITE_CONVEX_URL.
run = "bash scripts/dev.sh"

# Each worktree has its own local Convex deployment and its own port range, so
# multiple workspaces can run at the same time without sharing any backend.
run_mode = "concurrent"
